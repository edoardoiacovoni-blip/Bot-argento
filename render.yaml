services:
  - type: worker
    name: bot-argento
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PIONEX_API_KEY
        sync: false
      - key: PIONEX_SECRET_KEY
        sync: false
      - key: SILVER_SYMBOL
        sync: false
      - key: SILVER_BUY_AMOUNT_USDT
        value: "10"
      - key: DRY_RUN
        value: "0"
